name: my app pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  version-bump:
    runs-on: ubuntu-latest
    steps:
    # Checkout the code
    - name: Checkout code
      uses: actions/checkout@v2

    # Read current version from pom.xml and increment the patch version
    - name: Increment patch version
      id: version
      run: |
        # Get the current version from the pom.xml
        cd myapp
        VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
        NEW_VERSION=$(echo $VERSION | awk -F. '/[0-9]+\./{$NF++;print}' OFS=.)        
        # Update pom.xml with the new version
        mvn versions:set -DnewVersion=$NEW_VERSION
        mvn clean install
        echo "new version: $(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)"
    
    - name: Commit and push changes
      uses: EndBug/add-and-commit@v7
      with:
        author_name: github-actions[bot]
        author_email: github-actions[bot]@users.noreply.github.com
        message: "Bump version to ${{ steps.version.outputs.new_version }}"
        add: "pom.xml"
        
