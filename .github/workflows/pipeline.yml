name: myapp pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # Checkout the code
    - name: Checkout code
      uses: actions/checkout@v3

    # Read current version from pom.xml and increment the patch version
    - name: Increment patch version
      id: version
      run: |
        # Get the current version from the pom.xml
        cd myapp
        VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
        NEW_VERSION=$(echo $VERSION | awk -F. '/[0-9]+\./{$NF++;print}' OFS=.)        
        # Update pom.xml with the new version
        mvn versions:set -DnewVersion=$NEW_VERSION
        mvn clean install
        echo "new_version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT

    - name: Commit and push changes
      run: |
        git config user.name github-actions
        git config user.email github-actions@github.com
        git add .
        git commit -m "Bump version to ${{ steps.version.outputs.new_version }}"
        git push
        
    # - name: Compile Package and Create an artifact item
    #   run: |
    #     cd myapp
    #     mvn clean package

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        file: ./Dockerfile
        push: true
        tags: maven-hello-world:${{ steps.version.outputs.new_version }}
